<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4ead6">
<title>ну шо ти сьогодні? · тест від Тані</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;700&family=Pinyon+Script&family=Italianno&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
@font-face { font-family: 'Soyuz Grotesk'; src: local('Soyuz Grotesk Bold'), local('SoyuzGrotesk-Bold'), local('Soyuz Grotesk'); font-display: swap; }
@font-face { font-family: 'Vivaldi'; src: local('Vivaldi'), local('Vivaldi Italic'); font-display: swap; }

:root {
  /* журнальна папір-палітра */
  --paper: #f4ead6;          /* теплий кремовий папір */
  --paper-light: #fbf4e3;
  --paper-mid: #e8d9b8;
  --paper-dark: #d4c19a;
  --ink: #1a2113;
  --ink-soft: #3d4a30;
  --ink-mid: #6a6e54;
  --line: #c9b890;

  /* акценти */
  --coral: #c9784e;          /* журнальний теракотовий */
  --coral-light: #d99070;
  --gold: #c9a878;
  --green: #5a6b47;
  --green-deep: #2a3520;
  --rose: #b87a6c;

  /* для кольорового кодування результатів */
  --r1: #7a8a55;             /* зелений (спокій) */
  --r2: #d4a847;             /* жовто-золотий */
  --r3: #c9784e;             /* теракот */
  --r4: #a84432;             /* глибокий червоний */
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--paper);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(201,168,120,0.12), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(201,120,78,0.06), transparent 50%);
  color: var(--ink);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  min-height: 100svh;
  overflow-x: hidden;
}

/* === Типографіка === */
.display {
  font-family: 'Soyuz Grotesk', 'Anton', sans-serif;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 0.92;
  text-transform: lowercase;
}
.editorial {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.05;
}
.script {
  font-family: 'Vivaldi', 'Pinyon Script', 'Italianno', cursive;
  font-weight: 400;
  font-style: italic;
  line-height: 1.05;
}

/* === Topbar (темна сторона) === */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  background: var(--green-deep);
  color: var(--paper);
  padding-top: env(safe-area-inset-top);
}
.topbar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 22px;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
}
.topbar-inner .brand {
  font-family: 'Vivaldi', 'Pinyon Script', cursive;
  font-size: 22px;
  text-transform: none;
  letter-spacing: normal;
  color: var(--gold);
  font-weight: 400;
}
.progress {
  height: 3px;
  background: rgba(244, 234, 214, 0.15);
}
.progress-fill {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--gold), var(--coral));
  transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

/* === Контейнер === */
.quiz-app {
  padding-top: calc(env(safe-area-inset-top) + 52px);
  padding-bottom: 60px;
  min-height: 100vh;
  min-height: 100svh;
}
.wrap {
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  padding: 0 22px;
}

.screen { display: none; animation: fadeIn 0.55s cubic-bezier(0.22, 1, 0.36, 1); }
.screen.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================ */
/* ===== ЖУРНАЛЬНІ ЕЛЕМЕНТИ =================== */
/* ============================================ */

/* Декоративні зірочки/крапки */
.deco-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin: 16px 0;
  color: var(--coral);
  font-size: 18px;
  letter-spacing: 0.4em;
}
.deco-row.tight { gap: 8px; font-size: 14px; }

/* Стрічка-кутик (corner ribbon) */
.ribbon {
  display: inline-block;
  background: var(--ink);
  color: var(--paper);
  padding: 6px 16px;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  font-weight: 700;
  border-radius: 0;
  transform: rotate(-1.5deg);
}

/* Великий номер (як обкладинка журналу) */
.big-num {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 700;
  font-style: italic;
  font-size: 90px;
  line-height: 1;
  color: var(--coral);
  display: inline-block;
}

/* Лінія-розділювач */
.divider {
  height: 1px;
  background: var(--line);
  margin: 20px 0;
}
.divider-double {
  height: 4px;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  margin: 24px 0;
}

/* ============================================ */
/* ===== INTRO (обкладинка) =================== */
/* ============================================ */
.intro {
  text-align: center;
  padding: 30px 0 40px;
  position: relative;
}
.intro .ribbon {
  margin-bottom: 28px;
}
.intro h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 700;
  font-style: italic;
  font-size: clamp(46px, 13vw, 78px);
  color: var(--ink);
  line-height: 0.95;
  margin: 0 0 6px;
  letter-spacing: -0.02em;
}
.intro .script-line {
  font-family: 'Vivaldi', 'Pinyon Script', cursive;
  font-style: italic;
  font-size: clamp(28px, 8vw, 42px);
  color: var(--coral);
  line-height: 1.1;
  display: block;
  margin: 4px 0 0;
  transform: rotate(-1deg);
}
.intro .deco-row { margin: 24px 0 28px; }
.intro .cover-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 30px 0 22px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ink);
  font-weight: 600;
}
.intro .cover-label .italic { font-style: italic; text-transform: lowercase; letter-spacing: 0; font-size: 13px; font-family: 'Playfair Display', serif; }

/* ============================================ */
/* ===== QUESTION (журнальна сторінка) ======== */
/* ============================================ */
.q-screen { padding: 24px 0; }

.q-header {
  display: flex;
  align-items: baseline;
  gap: 18px;
  margin-bottom: 8px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--ink);
}
.q-header .num {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 70px;
  line-height: 0.9;
  color: var(--coral);
}
.q-header .label {
  flex: 1;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-soft);
  text-align: right;
  font-weight: 600;
}
.q-header .label span { display: block; font-size: 22px; letter-spacing: 0; text-transform: lowercase; font-family: 'Vivaldi', 'Pinyon Script', cursive; font-weight: 400; color: var(--coral); margin-top: 2px; }

.q-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 700;
  font-style: italic;
  font-size: clamp(26px, 7vw, 34px);
  color: var(--ink);
  line-height: 1.2;
  margin: 24px 0 28px;
  letter-spacing: -0.01em;
}

.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--paper-light);
  border: 1.5px solid var(--line);
  border-radius: 6px;
  padding: 16px 20px 16px 16px;
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  text-align: left;
  cursor: pointer;
  line-height: 1.4;
  transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  overflow: hidden;
}
.option .letter {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--paper);
  border: 1.5px solid var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-style: italic;
  font-size: 17px;
  color: var(--ink);
  margin-top: -2px;
  transition: all 0.3s;
}
.option .txt { flex: 1; padding-top: 4px; }
.option:hover {
  background: var(--paper-mid);
  border-color: var(--ink);
  transform: translateX(4px);
}
.option:hover .letter {
  background: var(--coral);
  color: var(--paper);
  border-color: var(--coral);
}
.option:active { transform: scale(0.98) translateX(4px); }
.option.selected {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.option.selected .letter {
  background: var(--coral);
  color: var(--paper);
  border-color: var(--coral);
}

.q-footer {
  text-align: center;
  margin-top: 32px;
  color: var(--ink-mid);
}

/* ============================================ */
/* ===== INSIGHT (пул-цитата) ================= */
/* ============================================ */
.insight {
  padding: 30px 0;
  text-align: center;
}
.insight .step-label {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-mid);
  margin-bottom: 14px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
}
.insight .step-label::before,
.insight .step-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
  max-width: 80px;
}

.insight .your-answer {
  font-family: 'Vivaldi', 'Pinyon Script', cursive;
  font-style: italic;
  font-size: clamp(32px, 9vw, 46px);
  color: var(--coral);
  line-height: 1.15;
  margin: 12px 0 28px;
  transform: rotate(-1.5deg);
  display: inline-block;
}

.insight .quote-block {
  position: relative;
  padding: 22px 18px 18px;
  margin: 18px 0;
}
.insight .quote-block::before {
  content: '«';
  position: absolute;
  top: -10px; left: -8px;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-style: italic;
  font-size: 80px;
  color: var(--coral);
  line-height: 1;
  opacity: 0.45;
}
.insight .quote-block::after {
  content: '»';
  position: absolute;
  bottom: -38px; right: -4px;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-style: italic;
  font-size: 80px;
  color: var(--coral);
  line-height: 1;
  opacity: 0.45;
}
.insight .quote-block .text {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 700;
  font-style: italic;
  font-size: clamp(20px, 5.5vw, 24px);
  color: var(--ink);
  line-height: 1.35;
  text-align: left;
  letter-spacing: -0.005em;
}

.insight .small {
  font-size: 14px;
  color: var(--ink-mid);
  line-height: 1.55;
  margin: 38px auto 30px;
  max-width: 400px;
  text-align: left;
  padding-top: 16px;
  border-top: 1px solid var(--line);
  font-style: italic;
}

/* ============================================ */
/* ===== RESULT (журнальний reveal) =========== */
/* ============================================ */
.result { padding: 20px 0 30px; }

.result-cover {
  background: var(--ink);
  color: var(--paper);
  border-radius: 8px;
  padding: 32px 26px;
  text-align: center;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.result-cover.lvl-1 { background: linear-gradient(160deg, #5a6b47, #3d4a30); }
.result-cover.lvl-2 { background: linear-gradient(160deg, #d4a847, #ad8830); }
.result-cover.lvl-3 { background: linear-gradient(160deg, #c9784e, #a85d3a); }
.result-cover.lvl-4 { background: linear-gradient(160deg, #a84432, #7a2e1f); }

.result-cover .type-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--paper);
  opacity: 0.85;
  margin-bottom: 14px;
  font-weight: 700;
}
.result-cover .type-num {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 60px;
  color: var(--paper);
  line-height: 0.9;
  margin-bottom: 8px;
  opacity: 0.95;
}
.result-cover .type-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 700;
  font-style: italic;
  font-size: clamp(32px, 9vw, 44px);
  color: var(--paper);
  line-height: 1.05;
  letter-spacing: -0.015em;
}
.result-cover .type-tag {
  font-family: 'Vivaldi', 'Pinyon Script', cursive;
  font-style: italic;
  font-size: clamp(22px, 6vw, 28px);
  color: var(--paper);
  opacity: 0.85;
  margin-top: 10px;
  transform: rotate(-1deg);
  display: inline-block;
}

.result .summary {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 400;
  font-style: italic;
  font-size: 19px;
  color: var(--ink);
  margin: 22px 0;
  line-height: 1.5;
  text-align: center;
  letter-spacing: -0.005em;
}

.score-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 24px 0 28px;
  padding: 16px 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.score-bar .label {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: var(--ink-mid);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 600;
}
.score-bar .bar {
  flex: 1;
  height: 5px;
  background: var(--paper-mid);
  border-radius: 3px;
  overflow: hidden;
}
.score-bar .bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--r1), var(--r2), var(--r3), var(--r4));
  border-radius: 3px;
  transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
}
.score-bar .score {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 24px;
  color: var(--coral);
}

.recommendation {
  background: var(--paper-light);
  border: 1.5px solid var(--ink);
  border-radius: 8px;
  padding: 24px 22px;
  margin-bottom: 26px;
  position: relative;
}
.recommendation .editor-note {
  position: absolute;
  top: -12px;
  left: 20px;
  background: var(--paper);
  padding: 0 10px;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--coral);
  font-weight: 700;
}
.recommendation h3 {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 700;
  font-style: italic;
  font-size: 22px;
  color: var(--ink);
  margin: 4px 0 14px;
  letter-spacing: -0.005em;
}
.recommendation p {
  font-size: 15px;
  color: var(--ink-soft);
  line-height: 1.55;
  margin-bottom: 10px;
}
.recommendation p:last-child { margin-bottom: 0; }

/* ============================================ */
/* ===== КНОПКИ ================================ */
/* ============================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: var(--ink);
  color: var(--paper);
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 18px 36px;
  border: none;
  border-radius: 60px;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  isolation: isolate;
  min-width: 200px;
  width: 100%;
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
              box-shadow 0.35s ease,
              background 0.3s ease;
  will-change: transform, box-shadow;
  box-shadow: 0 4px 14px rgba(26, 33, 19, 0.18);
}
.btn::before {
  content: '';
  position: absolute;
  top: 0; left: -120%;
  width: 60%; height: 100%;
  background: linear-gradient(
    105deg,
    transparent 0%,
    rgba(255, 250, 235, 0.35) 50%,
    transparent 100%
  );
  transform: skewX(-20deg);
  transition: left 0.85s cubic-bezier(0.22, 1, 0.36, 1);
  pointer-events: none;
  z-index: 1;
}
.btn:hover::before { left: 130%; }
.btn:hover {
  transform: translateY(-3px) scale(1.025);
  box-shadow:
    0 18px 32px rgba(26, 33, 19, 0.3),
    0 0 0 1px rgba(201, 120, 78, 0.4),
    0 0 60px rgba(201, 120, 78, 0.18);
}
.btn:active {
  transform: translateY(-1px) scale(0.985);
  transition: transform 0.1s ease;
}

/* Coral CTA (головна) */
.btn.coral {
  background: var(--coral);
  color: var(--paper);
  animation: coral-pulse 2.8s ease-in-out infinite;
}
.btn.coral:hover {
  background: #d6845a;
  box-shadow:
    0 22px 40px rgba(201, 120, 78, 0.45),
    0 0 0 2px rgba(201, 120, 78, 0.5),
    0 0 80px rgba(201, 120, 78, 0.4);
  animation-play-state: paused;
}
@keyframes coral-pulse {
  0%, 100% { box-shadow: 0 6px 18px rgba(201, 120, 78, 0.3), 0 0 0 0 rgba(201, 120, 78, 0.4); }
  50% { box-shadow: 0 10px 28px rgba(201, 120, 78, 0.45), 0 0 0 10px rgba(201, 120, 78, 0); }
}

.btn.ghost {
  background: transparent;
  border: 1.5px solid var(--ink);
  color: var(--ink);
  box-shadow: none;
  padding: 14px 28px;
  font-size: 13px;
  min-width: auto;
  width: auto;
}
.btn.ghost:hover {
  background: var(--ink);
  color: var(--paper);
  box-shadow: 0 8px 20px rgba(26, 33, 19, 0.2);
}

.btn .ripple {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(244, 234, 214, 0.55) 0%, rgba(244, 234, 214, 0) 70%);
  transform: scale(0);
  animation: ripple 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  pointer-events: none;
}
@keyframes ripple { to { transform: scale(4); opacity: 0; } }

.spark {
  position: absolute;
  width: 5px; height: 5px;
  background: var(--coral);
  border-radius: 50%;
  pointer-events: none;
  z-index: 5;
  box-shadow: 0 0 8px var(--coral), 0 0 16px rgba(201, 120, 78, 0.6);
  animation: spark-fly 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes spark-fly {
  0% { transform: translate(0, 0) scale(0); opacity: 1; }
  30% { transform: translate(var(--dx), var(--dy)) scale(1.2); opacity: 1; }
  100% { transform: translate(calc(var(--dx) * 2.2), calc(var(--dy) * 2.2 + 18px)) scale(0); opacity: 0; }
}
@media (hover: none) {
  .btn:hover { transform: none; }
  .btn.coral:hover { transform: none; background: var(--coral); }
}

.cta-row { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }

.footnote {
  margin-top: 22px;
  font-size: 11px;
  color: var(--ink-mid);
  text-align: center;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 600;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <span class="brand">тест</span>
    <span id="counter">00 / 06</span>
  </div>
  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
</header>

<div class="quiz-app">
  <div class="wrap">

    <!-- ===== INTRO (обкладинка) ===== -->
    <div class="screen intro active" id="intro">
      <span class="ribbon">тест № 01</span>

      <div class="deco-row">✦ ✦ ✦</div>

      <h1>ну шо ти<br>сьогодні?<span class="script-line">а давай я вгадаю — за 6 питань</span></h1>

      <div class="deco-row">✦ ✦ ✦</div>

      <div class="cover-label">
        <span>6 питань</span>

const letters = ['А', 'Б', 'В', 'Г'];

// ====== ЛОГІКА ======
const screenEl = document.getElementById('screen');
const introEl = document.getElementById('intro');
const progressFill = document.getElementById('progressFill');
const counter = document.getElementById('counter');

let current = 0;
let showingInsight = false;
let answers = [];

function start() {
  introEl.classList.remove('active');
  current = 0;
  answers = [];
  renderQuestion();
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function updateProgress() {
  const step = current + (showingInsight ? 0.55 : 0);
  const pct = (step / questions.length) * 100;
  progressFill.style.width = pct + '%';
  counter.textContent = pad(current + 1) + ' / ' + pad(questions.length);
}

function renderQuestion() {
  showingInsight = false;
  const q = questions[current];
  screenEl.className = 'screen active';
  screenEl.innerHTML = `
    <div class="q-screen">
      <div class="q-header">
        <div class="num">${pad(current + 1)}</div>
        <div class="label">питання<span>з шести</span></div>
      </div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="option" data-score="${opt.score}" data-idx="${i}">
            <span class="letter">${letters[i]}</span>
            <span class="txt">${opt.txt}</span>
          </button>
        `).join('')}
      </div>
      <div class="q-footer">
        <div class="deco-row tight">✦ ✦ ✦</div>
      </div>
    </div>
  `;
  screenEl.style.animation = 'none';
  screenEl.offsetHeight;
  screenEl.style.animation = '';

  screenEl.querySelectorAll('.option').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.add('selected');
      const score = parseInt(btn.dataset.score, 10);
      const idx = parseInt(btn.dataset.idx, 10);
      const optionText = q.options[idx].txt;
      answers.push({ q: current, score, optionText });
      setTimeout(() => renderInsight(score, optionText), 320);
    });
  });

  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderInsight(score, optionText) {
  showingInsight = true;
  const q = questions[current];
  const ins = score <= 1 ? q.insights.low : q.insights.high;
  const isLast = current === questions.length - 1;

  screenEl.innerHTML = `
    <div class="insight">
      <div class="step-label">твоя відповідь · ${pad(current + 1)} з ${pad(questions.length)}</div>
      <div class="your-answer">«${optionText}»</div>
      <div class="quote-block">
        <div class="text">${ins.text}</div>
      </div>
      <div class="small">${ins.small}</div>
      <div class="cta-row">
        <button class="btn coral" id="nextBtn">${isLast ? 'подивитись результат →' : 'далі →'}</button>
      </div>
    </div>
  `;
  screenEl.style.animation = 'none';
  screenEl.offsetHeight;
  screenEl.style.animation = '';

  document.getElementById('nextBtn').addEventListener('click', () => {
    if (isLast) renderResult();
    else { current++; renderQuestion(); }
  });

  bindButtonEffects();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderResult() {
  const totalScore = answers.reduce((sum, a) => sum + a.score, 0);
  const maxScore = questions.length * 3;
  const result = results.find(r => totalScore >= r.min && totalScore <= r.max);
  const percent = (totalScore / maxScore) * 100;

  progressFill.style.width = '100%';
  counter.textContent = 'результат';

  screenEl.innerHTML = `
    <div class="result">
      <div class="result-cover lvl-${result.level}">
        <div class="type-label">${result.typeLabel}</div>
        <div class="type-num">№${result.typeNum}</div>
        <div class="type-name">${result.label}</div>
        <div class="type-tag">${result.tag}</div>
      </div>

      <div class="summary">${result.summary}</div>

      <div class="score-bar">
        <span class="label">твій бал</span>
        <div class="bar"><div class="bar-fill" id="barFill" style="width: 0%"></div></div>
        <span class="score">${totalScore}<span style="color: var(--ink-mid); font-size: 14px;">/${maxScore}</span></span>
      </div>

      <div class="recommendation">
        <span class="editor-note">від тані</span>
        <h3>${result.recoTitle}</h3>
        ${result.recoText.map(p => `<p>${p}</p>`).join('')}
      </div>

      <div class="cta-row">
        <a href="/" class="btn coral">${result.cta} →</a>
        ${result.extraCta ? `<a href="#" class="btn ghost" onclick="alert('Тут буде форма запису на консультацію'); return false;">${result.extraCta}</a>` : ''}
        <button class="btn ghost" onclick="start()" style="margin-top: 4px;">пройти ще раз</button>
      </div>
    </div>
  `;
  screenEl.style.animation = 'none';
  screenEl.offsetHeight;
  screenEl.style.animation = '';

  setTimeout(() => {
    const bf = document.getElementById('barFill');
    if (bf) bf.style.width = percent + '%';
  }, 250);

  bindButtonEffects();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ====== Ефекти кнопок ======
function emitSparks(btn, originX, originY, count = 8) {
  const rect = btn.getBoundingClientRect();
  for (let i = 0; i < count; i++) {
    const spark = document.createElement('span');
    spark.className = 'spark';
    spark.style.left = (originX - rect.left) + 'px';
    spark.style.top = (originY - rect.top) + 'px';
    const angle = Math.random() * Math.PI * 2;
    const distance = 24 + Math.random() * 28;
    spark.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
    spark.style.setProperty('--dy', Math.sin(angle) * distance * 0.7 + 'px');
    const size = 3 + Math.random() * 4;
    spark.style.width = spark.style.height = size + 'px';
    spark.style.animationDelay = (i * 25) + 'ms';
    btn.appendChild(spark);
    setTimeout(() => spark.remove(), 1000 + i * 25);
  }
}

function bindButtonEffects() {
  document.querySelectorAll('.btn').forEach(btn => {
    if (btn._bound) return;
    btn._bound = true;
    btn.addEventListener('click', function (e) {
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      const x = e.clientX || (rect.left + rect.width / 2);
      const y = e.clientY || (rect.top + rect.height / 2);
      ripple.style.left = (x - rect.left - size / 2) + 'px';
      ripple.style.top = (y - rect.top - size / 2) + 'px';
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);
      emitSparks(this, x, y, 10);
    });
    if (window.matchMedia('(hover: hover)').matches) {
      btn.addEventListener('mouseenter', function (e) {
        const rect = this.getBoundingClientRect();
        emitSparks(this, rect.left + rect.width / 2, rect.top + rect.height / 2, 5);
      });
    }
    btn.addEventListener('touchstart', function (e) {
      const touch = e.touches[0];
      emitSparks(this, touch.clientX, touch.clientY, 6);
    }, { passive: true });
  });
}

bindButtonEffects();
</script>
